<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FORGE — Умный дневник тренировок</title>
  <meta name="description" content="Персональный дневник тренировок. Автоматическая генерация программы, трекинг прогресса, личные рекорды и карта восстановления мышц.">

  <!-- Theme & PWA -->
  <meta name="theme-color" content="#0a0a0a">
  <meta name="color-scheme" content="dark">
  <link rel="manifest" href="/manifest.json">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FORGE">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/assets/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/assets/icons/icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="FORGE — Умный дневник тренировок">
  <meta property="og:description" content="Персональный трекер тренировок с автоподбором программы и анализом прогресса.">
  <meta property="og:image" content="/assets/og-image.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="FORGE — Умный дневник тренировок">
  <meta name="twitter:description" content="Персональный трекер тренировок с автоподбором программы и анализом прогресса.">
  <meta name="twitter:image" content="/assets/og-image.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&family=Inter+Tight:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div id="app">
  <div id="screen"></div>
  <nav class="nav hidden" id="nav">
    <button class="nav-btn active" data-tab="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12l9-9 9 9v10a2 2 0 01-2 2h-5v-7h-4v7H5a2 2 0 01-2-2V12z"/></svg>
      Сегодня
    </button>
    <button class="nav-btn" data-tab="workout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6.5 6.5l11 11M21 21l-1-1M3 3l1 1M18 22l4-4M2 6l4-4M7 17l-5 5M17 7l5-5"/><path d="M14 7l3 3M11 10l3 3"/></svg>
      Тренировка
    </button>
    <button class="nav-btn" data-tab="exercises">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      Упражнения
    </button>
    <button class="nav-btn" data-tab="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 20V10M9 20V4M15 20v-7M21 20V8"/></svg>
      Прогресс
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<div class="modal-backdrop" id="modal">
  <div class="modal" id="modal-content"></div>
</div>

<script src="/js/app.js"></script>
<script>
  // PWA Service Worker registration
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('[FORGE] Service Worker registered:', reg.scope))
        .catch(err => console.warn('[FORGE] SW registration failed:', err));
    });
  }
</script>
</body>
</html>
