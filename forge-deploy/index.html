<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FORGE — Smart Workout Journal</title>
  <meta name="description" content="Personal workout journal. Auto-generated programs, progress tracking, personal records, and muscle recovery map.">

  <!-- Theme & PWA -->
  <meta name="theme-color" content="#0a0a0a">
  <meta name="color-scheme" content="dark">
  <link rel="manifest" href="/manifest.json">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FORGE">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/assets/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/assets/icons/icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="FORGE — Smart Workout Journal">
  <meta property="og:description" content="Personal workout tracker with auto-generated programs and progress analytics.">
  <meta property="og:image" content="/assets/og-image.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="FORGE — Smart Workout Journal">
  <meta name="twitter:description" content="Personal workout tracker with auto-generated programs and progress analytics.">
  <meta name="twitter:image" content="/assets/og-image.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&family=Inter+Tight:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<!-- Плашка обновления (показывается только когда новая версия SW готова) -->
<div id="update-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#d4ff3a;color:#0a0a0a;padding:12px 16px;display:none;align-items:center;justify-content:space-between;gap:12px;font-family:-apple-system,BlinkMacSystemFont,'Inter Tight',sans-serif;font-weight:600;font-size:14px;box-shadow:0 2px 12px rgba(0,0,0,0.4);">
  <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
    <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">New version available</span>
  </div>
  <button id="update-banner-btn" style="background:#0a0a0a;color:#d4ff3a;border:none;padding:8px 16px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;letter-spacing:0.05em;flex-shrink:0;">UPDATE</button>
  <button id="update-banner-close" aria-label="Dismiss" style="background:transparent;border:none;color:#0a0a0a;cursor:pointer;padding:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
  </button>
</div>

<div id="app">
  <div id="screen"></div>
  <nav class="nav hidden" id="nav">
    <button class="nav-btn active" data-tab="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12l9-9 9 9v10a2 2 0 01-2 2h-5v-7h-4v7H5a2 2 0 01-2-2V12z"/></svg>
      Today
    </button>
    <button class="nav-btn" data-tab="workout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6.5 6.5l11 11M21 21l-1-1M3 3l1 1M18 22l4-4M2 6l4-4M7 17l-5 5M17 7l5-5"/><path d="M14 7l3 3M11 10l3 3"/></svg>
      Workout
    </button>
    <button class="nav-btn" data-tab="exercises">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      Exercises
    </button>
    <button class="nav-btn" data-tab="morning">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      Morning
    </button>
    <button class="nav-btn" data-tab="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 20V10M9 20V4M15 20v-7M21 20V8"/></svg>
      Progress
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<div class="modal-backdrop" id="modal">
  <div class="modal" id="modal-content"></div>
</div>

<script src="/js/app.js"></script>
<script>
  // PWA Service Worker registration with manual update prompt
  if ('serviceWorker' in navigator) {
    const banner = document.getElementById('update-banner');
    const updateBtn = document.getElementById('update-banner-btn');
    const closeBtn = document.getElementById('update-banner-close');
    let waitingWorker = null;
    let dismissedUntil = 0; // timestamp до которого юзер скрыл плашку

    function showUpdateBanner(worker) {
      waitingWorker = worker;
      // Если юзер недавно скрыл — не показываем
      if (Date.now() < dismissedUntil) return;
      banner.style.display = 'flex';
    }

    function hideUpdateBanner() {
      banner.style.display = 'none';
    }

    // Кнопка UPDATE — активирует новый SW и перезагружает страницу
    updateBtn.addEventListener('click', () => {
      if (!waitingWorker) {
        // Fallback: hard reload
        window.location.reload();
        return;
      }
      waitingWorker.postMessage({ type: 'SKIP_WAITING' });
      // Перезагрузка случится через controllerchange ниже
    });

    // Кнопка закрытия — скрываем на 5 минут (плашка вернётся при следующей проверке)
    closeBtn.addEventListener('click', () => {
      hideUpdateBanner();
      dismissedUntil = Date.now() + 5 * 60 * 1000;
    });

    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => {
          console.log('[FORGE] SW registered:', reg.scope);

          // Проверяем обновления при запуске
          reg.update();

          // Если уже есть waiting (с прошлой загрузки) — сразу показываем
          if (reg.waiting && navigator.serviceWorker.controller) {
            showUpdateBanner(reg.waiting);
          }

          // Если найдена новая версия SW
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            if (!newWorker) return;

            newWorker.addEventListener('statechange', () => {
              // Когда новый SW установился И есть старый активный — показываем плашку
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('[FORGE] New version installed, ready to update');
                showUpdateBanner(newWorker);
              }
            });
          });
        })
        .catch(err => console.warn('[FORGE] SW registration failed:', err));

      // Когда контроллер сменился (новый SW взял управление) — перезагружаем страницу
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        console.log('[FORGE] Controller changed, reloading');
        window.location.reload();
      });

      // Каждые 60 сек проверяем обновления (актуально для PWA, открытого днями)
      setInterval(() => {
        navigator.serviceWorker.getRegistration().then(reg => {
          if (reg) reg.update();
        });
      }, 60000);

      // Также проверяем при возврате к вкладке (важно для Safari)
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          navigator.serviceWorker.getRegistration().then(reg => {
            if (reg) reg.update();
          });
        }
      });
    });
  }
</script>
</body>
</html>
